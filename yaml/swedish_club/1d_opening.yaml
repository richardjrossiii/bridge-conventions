conventions:
  1D!:
    1H|1S: Natural
    1NT!: Denies a 4 card major. Artifical invite+
    2C!: " C +  D, P/C"
    2D: Natural nonforcing, simple raise.
    2H!: "*Reverse Flannery*. 5+ H, 4 S sub invite."
    2S!: "*Reverse Flannery*. 5+ H, 4 S invitational."
    2NT!:
        description: "*Requests 3 C*. Opener may break to 3 D with 7+ D"
        
        P: Clubs, preemptive.
        3D:
          description: 5+ H, 5+ S slam try.
          
          3H|3S: Preference.
          3NT: No 3 card major, both minors controlled.
          
          4C: 6/5 or better in the minors
          4D: 7+ card D suit, no 3 card major.
          
          4H|4S: Very poor hand for slam, preference.
          
        3H: 5+ H, 5+ D slam try.
        3S: 5+ S, 5+ D slam try.
        3NT: Balanced slam try (especially interested in a running/semi-running suit).
        
    3D: Natural nonforcing, weak raise.