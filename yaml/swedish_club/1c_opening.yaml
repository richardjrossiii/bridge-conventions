conventions:
  1C!:
    1D!: 
        description: |
            Bust or  H, forcing one round.
            
            All bust hands bid 1 D, except when holding:
            
              - A "good" 6+ card major
              - 5+ C 5+ D
              - 5+ H , 4+  S.
        
        1S!: 10-13 balanced, 3- H
        1NT!: 10-13 balanced, 4 H
        2C|2D|2H|2S: 16-20 HCP, natural NF.
        
        # "New minor forcing"
        1S|1NT:
            2C!:
                description: |
                    ~~Asking.~~

                    Responder is known to have 4+ H for this bid, and has at most 3 S.
            
                2D!: minimum, 2H
                2H: minimum, 3 H
                2S![+]: Reverse relay, zoom balanced shapes.
            
            2D|2H|2S: Natural, to play.
            2NT!:
                description: Puppet to 3C
                
                P: To play
                3D: 5+ D, invitational
                3H: "*Undefined*"
                3S: Exactly 5 H, no choice of games.
                3NT: Balanced CoG, exactly 5 H
        
        1S/2C!:
            3m!: Maximum, 5 $m, 5332 pattern. (4=4-(3-2) is impossible)
            2S/2NT/3D!: Maximum, 4=2=5=2. (3=4=2=4 is impossible)
            2NT/3C/3NT!: Maximum, 4=2=2=5. (3=4=4=2 is impossible)
    
    1H!!: 
        description: ==Spades==. 8+ HCP, 4+ S. May hold longer hearts.
        define:
            "$M": "S"
        
        1NT: 10-13 balanced, 3- S
        2C|2D|2H: Natural, GF.
        
        2S: 10-13 balanced, 4S
        
        2NT: |
            *Undefined*. Could use this as a spade superfit, but why not relay? Teller is known to be a positive.

    1S!:
        description: |
            **Forcing.** *May have one 4 card major, never both.*
            
            Three possible hand types:
              - 0-7 HCP, promises 5+/5+ in  C / D
              - 8+ HCP balanced (never 4 H 4 S)
              - 8+ HCP, 5+ D, 4 C
            
            &nbsp;
        
        1NT:
            description: 10-13 Balanced.
            
            2C!: P/C (0-11 HCP, always promises 5 D)
            2D!: 12+ balanced. Major checkback, forcing 1 round.
            2H|2S: Natural stopper showing.
            2NT: Natural invite.
            3NT: Signoff.
        
        2M:
            description: Natural, 22+ HCP, forcing.
    
    1NT!!: ==Clubs==. 8+ HCP, 5+ C. May hold exactly 4 D.
    2C!!: ==Diamonds==. 8+ HCP, 6+ D. No other suit longer than 4 cards.
    2S!: 8+ HCP, 5+ D, 5+ C.
    
    
    # Non-relay responses
    2D!!: ==Spades==. 4-7 HCP. 4+ S and 5+ H or 6+ S.
    2H: 6+ H, 4-7 HCP.
      
    2NT: 6+ C, 4-7 HCP.
    3C: 4-7 HCP, 5+ C, 5+ D in the minors (either way). Often 6-5 when vulnerable (either way).
    3D: 4-7 HCP, 6+ D.
    3M: 4-7 HCP, 7+ $M, promises shortness (7222 bids 2 M)
    3NT: Running 7 card suit (any), no other outside points.

    # Relay continuations
    1D/1H!:
        description: ~~Asking~~. 16+ any shape.
        1S!: |
            Artificial. Forcing 1 round.

              - 0-7 HCP, 
              - 8-11 balanced with 4 H
              - 8+ HCP 3 suited without spades.
    
            &nbsp;
        
        1NT: 6-7 HCP, no 5 card major.
        2C!!: 8+ HCP, 4+ H, 4+ D
        2D!!: 8+ HCP, 5+ H, 4+ C
        2H!!: 8+ HCP, 4 H , 5+ C
        2NT[+]: "*Zoom singled suited shapes*"
        
        1S/1NT:
            description: |
              Signoff attempt, typically 17-18 ~bal.
              Responder may pass with a poor 5 card club suit.
            
            2C!:
                description: Promises a 5+ card suit, typically 6-7 HCP
                
                2D!: 
                    description: Waiting
                    P: 5+ D, 0-5 HCP
                    2H: 5 H, 6-7 HCP
                    2S: 5 S, 6-7 HCP
                    2NT!: 5+ D, 6-7 HCP
                    3C: 5+ C, 6-7 HCP
                    
                2H: 5 H
                2S: 5 S
                
            2D!!: H transfer. 5+ H, 0-5 HCP
            2H!!: S transfer. 5+ S, 0-5 HCP
            
            2S![+]: "*Zoom balanced shapes. Promises 4 H*"
            
        1S/2C!:
            description: Requests 2D (balanced hand zooms), typically for 22+ hands.
            
            2D: 0-7 HCP.
            2H: "*Undefined*"
            
            2S!: "*Zoom balanced shapes. Promises 4 H*"
            
    1H/1S!:
        description: ~~Asking~~. 16+ any shape.
        
        1NT!:
            description: |
                Artificial.
                
                  - S + H
                  - 8-11 HCP balanced, 4S.
                  - 8+ HCP, S + C + D.
                
                &nbsp;
            
            2C!:
                2D!: Balanced or three suited.
                2D/2H:
                    2S[+]: "*Zoom balanced relay. Promises 4 S*"
                
                    3H: 5=0=4=4. (3=2=4=4 is impossible).
                    3S: 4=1=4=4. (2=3=4=4 is impossible).
                    
                    2S/2NT/3D: 4=0=5=4, 0-3 controls. (3=4=2=4 is impossible)
                    2NT/3C/3NT: 4=0=4=5, 0-3 controls. (3=4=4=2 is impossible)
                
                2H: 5+ H, 4 S
                2S: 5+ H, 5+ S
                2NT[+]: "*Zoom two suited, S > H*"
        
        2C!!: 4+ S, 4+ D unbalanced
        2D!!: 5+ S, 4+ C unbalanced
        2H!!: 4S, 5+ C unbalanced
        2NT[+]: "*Zoom singled suited shapes*"
            
    1S/2C!:
        description: ~~Asking~~. 16+ any shape.
        
        2D!: 0-7 HCP, 5+ C, 5+ D
        2H!: 8+ HCP, 5+ D, 4 C
        2S![+]: "*Zoom balanced shapes*"
        
        3m!: 5 $m , 5332 pattern. (4=4-(3-2) is impossible)
    
    1NT/2D!: 
        description: ~~Asking~~. 16+ any shape.
        
        2H!!: 5+ C, 4 D.
    
    2C/2H: ~~Asking.~~ 16+ any shape.